<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arvids IT-hjälp – Integritet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #0b8a8a;
    --teal-light: #e6f5f5;
    --teal-dark: #076666;
    --navy: #1a2b3c;
    --text: #2d3748;
    --muted: #5a6a7a;
    --sage: #f0f7f4;
    --white: #ffffff;
    --radius: 12px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--white);
    line-height: 1.7;
    font-size: 16px;
    padding: 56px 48px;
    max-width: 760px;
  }

  h1, h2 { font-family: 'Fraunces', serif; }

  h1 {
    font-size: 2.4rem;
    color: var(--teal);
    margin-bottom: 28px;
  }

  .intro {
    font-size: 1.05rem;
    color: var(--text);
    margin-bottom: 40px;
    padding: 24px 28px;
    background: var(--teal-light);
    border-left: 4px solid var(--teal);
    border-radius: 0 var(--radius) var(--radius) 0;
  }

  .principles {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 40px;
  }

  .principle {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    padding: 20px 24px;
    background: var(--sage);
    border-radius: var(--radius);
  }

  .principle-icon {
    font-size: 1.6rem;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .principle-text h2 {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    color: var(--navy);
    margin-bottom: 4px;
  }

  .principle-text p {
    color: var(--muted);
    font-size: 0.95rem;
  }

  .policy-link {
    font-size: 0.95rem;
    color: var(--teal);
    text-decoration: underline;
  }

  @media (max-width: 600px) {
    body { padding: 40px 24px; }
  }
</style>
</head>
<body>

<h1>Integritet</h1>

<div class="intro">
  När jag hjälper dig med dator, mobil eller annan teknik respekterar jag alltid din personliga integritet. All information jag kan komma i kontakt med, såsom filer, bilder, konton eller lösenord, stannar mellan oss och delas inte med någon annan.
</div>

</body>
</html>
