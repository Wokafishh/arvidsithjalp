    :root {

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--white); line-height: 1.7; font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    nav { position: sticky; top: 0; z-index: 100; background: var(--white); border-bottom: 1.5px solid var(--teal-light); display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 60px; box-shadow: 0 1px 8px rgba(11,138,138,0.07); }
    .nav-logo { font-family: 'Fraunces', serif; font-size: 1.15rem; font-weight: 700; color: var(--teal); text-decoration: none; white-space: nowrap; }
    .nav-links { display: flex; gap: 4px; list-style: none; }
    .nav-links a { display: block; padding: 6px 14px; border-radius: 8px; text-decoration: none; font-size: 0.9rem; font-weight: 500; color: var(--muted); transition: background 0.15s, color 0.15s; }
    .nav-links a:hover, .nav-links a.active { background: var(--teal-light); color: var(--teal); }
    .nav-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; }
    .nav-toggle span { display: block; width: 22px; height: 2px; background: var(--teal); border-radius: 2px; transition: transform 0.2s, opacity 0.2s; }
    .btn {
      display: inline-block;
      width: fit-content;
      background: var(--teal);
      color: white;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.2s;
      cursor: pointer;
      border: none;
      text-align: center;
    }.btn:hover { background: var(--teal-dark); }
    .hero { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; padding: 64px 48px 56px; }
    .hero h1 { font-size: clamp(2rem, 4vw, 2.8rem); color: var(--teal); line-height: 1.15; margin-bottom: 20px; }
    .hero-lead { font-size: 1.1rem; color: var(--navy); margin-bottom: 16px; font-weight: 600; }
    .hero p { color: var(--muted); margin-bottom: 16px; }
    .hero-img { border-radius: var(--radius); overflow: hidden; aspect-ratio: 4/3; background: var(--teal-light); contain: layout style paint; }
    .hero-img img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius); will-change: transform; }
    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .nav-toggle { display: flex; }
      .nav-links { display: none; flex-direction: column; gap: 4px; position: absolute; top: 60px; left: 0; right: 0; background: var(--white); border-bottom: 1.5px solid var(--teal-light); padding: 12px 16px 16px; box-shadow: 0 4px 12px rgba(11,138,138,0.1); }
      .nav-links.open { display: flex; }
      .nav-links a { padding: 10px 14px; font-size: 0.95rem; }
      .hero { grid-template-columns: 1fr; padding: 40px 24px; gap: 32px; }
      .hero-img { order: -1; }
        .btn {
        display: block;
        width: 100%;
      }
      .badge-group {
        flex-direction: column;
        align-items: stretch;
      }
    
      .fb-badge,
      .g-badge {
        justify-content: center;
      }
    }
